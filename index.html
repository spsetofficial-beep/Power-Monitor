<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  databaseURL: "https://power-monitor-21b92-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Power', data: [] },
      { label: 'Voltage', data: [] }
    ]
  }
});

onValue(ref(db, 'powerData'), snapshot => {
  const data = snapshot.val();
  const keys = Object.keys(data);

  const latest = data[keys[keys.length-1]];

  document.getElementById("pf").innerText = latest.pf;
  document.getElementById("freq").innerText = latest.frequency + " Hz";
  document.getElementById("reactive").innerText = latest.reactive + " VAR";
  document.getElementById("energy").innerText = latest.energy + " kWh";

  chart.data.labels.push(latest.time);
  chart.data.datasets[0].data.push(latest.power);
  chart.data.datasets[1].data.push(latest.voltage);
  chart.update();
});
</script>

<style>
body {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  font-family: 'Segoe UI';
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.value {
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}
</style>
</head>

<body>

<h1>⚡ Smart Power Dashboard</h1>

<div class="grid">

<div class="card">
<div>Power Factor</div>
<div id="pf" class="value">--</div>
</div>

<div class="card">
<div>Frequency</div>
<div id="freq" class="value">--</div>
</div>

<div class="card">
<div>Reactive Power</div>
<div id="reactive" class="value">--</div>
</div>

<div class="card">
<div>Energy</div>
<div id="energy" class="value">--</div>
</div>

</div>

<canvas id="chart"></canvas>

</body>
</html>
